<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>G&L Studio - Gestione Clienti</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
  <script src="auth.js"></script>
  <style>
    :root { --primary-color: #e63946; --secondary-color: #1d3557; --light-color: #f1faee; --gray-color: #8d99ae; --border-radius: 8px; --box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
    body { background-color: #f8f9fa; color: #333; padding: 20px; max-width: 1400px; margin: 0 auto; }
    .header { text-align: center; margin-bottom: 25px; padding: 15px; border-bottom: 3px solid var(--primary-color); }
    .header h1 { color: var(--secondary-color); font-size: 28px; margin-bottom: 8px; }
    .header p { color: var(--gray-color); font-size: 16px; }
    .nav-buttons { display: flex; justify-content: center; gap: 15px; margin-bottom: 30px; flex-wrap: wrap; }
    .nav-btn { padding: 12px 25px; background-color: var(--secondary-color); color: white; border: none; border-radius: var(--border-radius); font-size: 16px; cursor: pointer; transition: all 0.3s; }
    .nav-btn:hover { background-color: #0d2340; transform: translateY(-2px); }
    .nav-btn.logout { background-color: var(--primary-color); }
    .nav-btn.logout:hover { background-color: #c1272d; }
    .form-section { background: white; border-radius: var(--border-radius); box-shadow: var(--box-shadow); padding: 25px; margin-bottom: 30px; }
    .section-title { text-align: center; color: var(--secondary-color); font-size: 22px; margin-bottom: 25px; padding-bottom: 10px; border-bottom: 2px solid var(--gray-color); }
    .client-container { display: grid; grid-template-columns: repeat(auto-fit, minmax(450px, 1fr)); gap: 30px; margin-bottom: 30px; }
    .client-box { background: #fafafa; padding: 20px; border-radius: var(--border-radius); border: 1px solid #ddd; }
    .client-box h3 { color: var(--secondary-color); margin-bottom: 15px; font-size: 18px; display: flex; align-items: center; gap: 8px; }
    .client-fields { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
    .full-width { grid-column: span 2; }
    .field-group { margin-bottom: 15px; }
    .field-group label { display: block; margin-bottom: 6px; font-weight: 500; color: var(--secondary-color); }
    .field-group input, .field-group select, .field-group textarea { width: 100%; padding: 10px 12px; border: 1px solid #ddd; border-radius: 6px; font-size: 15px; }
    .field-group textarea { min-height: 80px; resize: vertical; }
    .maps-btn { background-color: #4285f4; color: white; border: none; border-radius: 6px; padding: 8px 12px; cursor: pointer; margin-left: 8px; font-size: 14px; transition: background-color 0.2s; }
    .maps-btn:hover { background-color: #3367d6; }
    .service-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; margin-bottom: 25px; }
    .service-item { display: flex; flex-direction: column; gap: 8px; }
    .service-item select, .service-item input[type="number"] { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 6px; font-size: 14px; }
    .highlight-line { text-align: center; color: var(--primary-color); font-weight: bold; font-size: 20px; margin: 25px 0; padding: 12px; background-color: rgba(230, 57, 70, 0.08); border-radius: var(--border-radius); letter-spacing: 1px; }
    .amount-section { text-align: center; margin: 30px 0; }
    #importoTotale { width: 100%; max-width: 400px; margin: 0 auto; padding: 18px; font-size: 32px; font-weight: bold; color: var(--primary-color); border: 3px solid var(--primary-color); border-radius: 12px; background-color: rgba(230, 57, 70, 0.05); text-align: center; letter-spacing: 1px; }
    .action-buttons { display: flex; justify-content: center; gap: 15px; margin-top: 25px; flex-wrap: wrap; }
    .action-btn { padding: 14px 28px; border: none; border-radius: var(--border-radius); font-size: 16px; font-weight: 600; cursor: pointer; transition: all 0.3s; display: flex; align-items: center; gap: 8px; }
    .save-btn { background-color: var(--primary-color); color: white; }
    .save-btn:hover { background-color: #c1272d; transform: scale(1.03); }
    .deposit-section { margin-top: 25px; padding-top: 20px; border-top: 2px dashed #ddd; }
    .deposit-item { display: flex; align-items: center; gap: 15px; padding: 12px; background-color: #f9f9f9; border-radius: 8px; margin-bottom: 12px; }
    .deposit-item input { flex: 1; padding: 8px 12px; border: 1px solid #ddd; border-radius: 6px; font-size: 15px; }
    .deposit-btn { padding: 8px 15px; background-color: #4CAF50; color: white; border: none; border-radius: 6px; cursor: pointer; }
    .deposit-btn.delete { background-color: #f44336; }
    .deposit-btn.edit { background-color: #2196F3; }
    .deposit-btn:hover { opacity: 0.9; }
    .balance-line { text-align: center; font-size: 24px; font-weight: bold; color: var(--primary-color); margin: 25px 0; padding: 15px; background-color: rgba(230, 57, 70, 0.1); border-radius: var(--border-radius); letter-spacing: 1px; }
    .client-list { display: grid; gap: 15px; margin-top: 30px; }
    .client-card { background: white; border-radius: var(--border-radius); box-shadow: var(--box-shadow); padding: 20px; cursor: pointer; transition: transform 0.2s; border-left: 5px solid var(--secondary-color); }
    .client-card:hover { transform: translateX(5px); }
    .client-card-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; flex-wrap: wrap; gap: 10px; }
    .client-card-title { font-size: 18px; font-weight: bold; color: var(--secondary-color); }
    .client-card-date { background-color: var(--primary-color); color: white; padding: 4px 10px; border-radius: 20px; font-size: 14px; font-weight: bold; }
    .client-card-service { color: var(--gray-color); font-size: 15px; margin-bottom: 10px; }
    .client-card-amounts { display: flex; justify-content: space-between; font-size: 16px; margin-top: 15px; flex-wrap: wrap; gap: 10px; }
    .client-card-total { font-weight: bold; color: var(--primary-color); }
    .client-card-deposits { color: #4CAF50; font-weight: 500; }
    .client-card-balance { font-weight: bold; color: var(--primary-color); }
    .card-buttons { display: flex; justify-content: flex-end; gap: 10px; margin-top: 15px; flex-wrap: wrap; }
    .card-btn { padding: 8px 15px; border: none; border-radius: 6px; font-size: 14px; cursor: pointer; display: flex; align-items: center; gap: 6px; }
    .card-btn.whatsapp { background-color: #25D366; color: white; }
    .card-btn.edit { background-color: #2196F3; color: white; }
    .card-btn.delete { background-color: #f44336; color: white; }
    .card-btn.pdf { background-color: #6c757d; color: white; }
    .card-btn:hover { opacity: 0.9; }
    .search-container { margin: 25px 0; text-align: center; }
    #searchInput { padding: 12px 20px; width: 100%; max-width: 500px; border: 2px solid #ddd; border-radius: 30px; font-size: 16px; outline: none; transition: border-color 0.3s; }
    #searchInput:focus { border-color: var(--primary-color); }
    .app-gallery { background-color: #f8f9fa; padding: 25px; border-radius: var(--border-radius); margin-top: 25px; }
    .gallery-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; margin-top: 15px; }
    .gallery-item.full { grid-column: span 3; }
    @media (max-width: 1100px) { .service-grid { grid-template-columns: repeat(2, 1fr); } .client-container, .gallery-grid { grid-template-columns: 1fr; } .client-fields { grid-template-columns: 1fr; } }
    @media (max-width: 768px) { .service-grid { grid-template-columns: 1fr; } .action-buttons, .nav-buttons { flex-direction: column; align-items: center; } .action-btn, .nav-btn { width: 100%; max-width: 300px; } #importoTotale { font-size: 26px; padding: 15px; } .balance-line { font-size: 20px; padding: 12px; } }
    .hidden { display: none; }
  </style>
</head>
<body>
  <div class="header">

    <p>Via Ciarrocco n.21, Canicattì (AG)</p>
  </div>
  <div class="nav-buttons">

    <div style="display: flex; gap: 20px; margin-bottom: 20px; flex-wrap: wrap; align-items: center;">
      <div class="field-group" style="flex: 1; min-width: 200px;"><label for="tipoServizio">Tipo di Servizio</label><select id="tipoServizio" style="width: 100%; padding: 10px; border-radius: 6px; border: 1px solid #ddd; font-size: 15px;"><option value="">Seleziona...</option><option value="Anniversario">Anniversario</option><option value="Compleanno">Compleanno</option><option value="Battesimo">Battesimo</option><option value="Comunione">Comunione</option><option value="Cresima">Cresima</option><option value="Percorso Catecumenale">Percorso Catecumenale</option><option value="Matrimonio">Matrimonio</option><option value="Maternity">Maternity</option><option value="New Born">New Born</option><option value="Maternity+New Born">Maternity+New Born</option><option value="Evento">Evento</option><option value="SOLO STAMPE">SOLO STAMPE</option></select></div>
      <div class="field-group" style="flex: 1; min-width: 200px;"><label for="dataEvento">Data Evento</label><input type="date" id="dataEvento" style="width: 100%; padding: 10px; border-radius: 6px; border: 1px solid #ddd; font-size: 15px;"></div>

      <div class="service-item"><label for="video">Video</label><select id="video"><option value="">Nessuno</option><option value="SOLO GIORNATA">SOLO GIORNATA</option><option value="GIORNATA+DRONE">GIORNATA+DRONE</option><option value="Giorn+Drone+Proiezione ANTEPRIMA">Giorn+Drone+Proiezione ANTEPRIMA</option><option value="Giorn.+Drone+Proiezione ANTEPRIMA+LIVE">Giorn.+Drone+Proiezione ANTEPRIMA+LIVE</option><option value="Giorn.+Drone+Proiezione LIVE">Giorn.+Drone+Proiezione LIVE</option></select></div>
      <div class="service-item"><label for="tela">TELA</label><select id="tela"><option value="">Nessuna</option><option value="30x40 cm - Telaio Standard">30x40 cm - Telaio Standard</option><option value="40x50 cm - Telaio Standard">40x50 cm - Telaio Standard</option><option value="50x70 cm - Telaio Standard">50x70 cm - Telaio Standard</option><option value="30x40 cm - Telaio Spesso">30x40 cm - Telaio Spesso</option><option value="40x50 cm - Telaio Spesso">40x50 cm - Telaio Spesso</option><option value="50x70 cm - Telaio Spesso">50x70 cm - Telaio Spesso</option></select></div>

  <div class="form-section">
    <h2 class="section-title">Archivio Clienti</h2>
    <div class="client-list" id="clientList"></div>
  </div>
  <script>
    const { jsPDF } = window.jspdf;
    document.addEventListener('DOMContentLoaded', function() { loadClients(); setupDepositFormatting(); initEditForm(); });
    function setupDepositFormatting() {
      document.addEventListener('input', function(e) {
        if (e.target.classList.contains('deposit-date')) {
          let value = e.target.value.replace(/\D/g, '');
          if (value.length > 2 && value.length <= 4) { value = value.slice(0, 2) + '/' + value.slice(2); }
          else if (value.length > 4) { value = value.slice(0, 2) + '/' + value.slice(2, 4) + '/' + value.slice(4, 8); }
          e.target.value = value;
        }
      });
    }
    function addDeposit() {
      const depositList = document.getElementById('depositList');
      const now = new Date();
      const today = ('0' + now.getDate()).slice(-2) + '/' + ('0' + (now.getMonth() + 1)).slice(-2) + '/' + now.getFullYear();
      const depositDiv = document.createElement('div');
      depositDiv.className = 'deposit-item';
      depositDiv.innerHTML = '<input type="text" class="deposit-date" placeholder="gg/mm/aaaa" value="' + today + '" maxlength="10" style="width: 120px; text-align: center;"><input type="text" class="deposit-amount" placeholder="Importo (€)" style="flex: 1;" oninput="calculateBalance()"><button class="deposit-btn edit" onclick="editDeposit(this)">✏️</button><button class="deposit-btn delete" onclick="deleteDeposit(this)">❌</button>';
      depositList.appendChild(depositDiv);
      calculateBalance();
    }
    function editDeposit(btn) {
      const depositItem = btn.closest('.deposit-item');
      const inputs = depositItem.querySelectorAll('input');
      const isEditing = !inputs[0].readOnly;
      if (isEditing) { inputs.forEach(input => { input.readOnly = true; input.style.backgroundColor = '#f9f9f9'; }); btn.textContent = '✏️'; }
      else { inputs.forEach(input => { input.readOnly = false; input.style.backgroundColor = 'white'; }); btn.textContent = '💾'; }
      calculateBalance();
    }
    function deleteDeposit(btn) { const depositItem = btn.closest('.deposit-item'); depositItem.remove(); calculateBalance(); }
    function calculateBalance() {
      const importoText = document.getElementById('importoTotale').value.trim().replace('€', '').replace(/\./g, '').replace(',', '.');
      const importoTotale = parseFloat(importoText) || 0;
      let totaleAcconti = 0;
      document.querySelectorAll('.deposit-amount').forEach(input => {
        const value = input.value.trim().replace('€', '').replace(/\./g, '').replace(',', '.');
        const amount = parseFloat(value) || 0;
        totaleAcconti += amount;
      });
      const saldo = importoTotale - totaleAcconti;
      document.getElementById('saldoResiduo').textContent = 'SALDO RESIDUO: € ' + saldo.toFixed(2).replace('.', ',');
    }
    function saveClient() {
      const cognome1 = document.getElementById('cognome1').value.trim();
      const nome1 = document.getElementById('nome1').value.trim();
      const telefono1 = document.getElementById('telefono1').value.trim();
      const tipoServizio = document.getElementById('tipoServizio').value;
      const dataEvento = document.getElementById('dataEvento').value;
      const importoText = document.getElementById('importoTotale').value.trim().replace('€', '').replace(/\./g, '').replace(',', '.');
      if (!cognome1 || !nome1 || !telefono1) { alert('⚠️ Compila almeno Cognome, Nome e Telefono del Cliente 1'); return; }
      if (!tipoServizio) { alert('⚠️ Seleziona il Tipo di Servizio'); return; }
      if (!dataEvento) { alert('⚠️ Inserisci la Data dell\'Evento'); return; }
      if (!importoText || parseFloat(importoText) <= 0) { alert('⚠️ Inserisci un Importo Totale valido'); return; }
      const acconti = [];
      document.querySelectorAll('.deposit-item').forEach(item => {
        const dateInput = item.querySelector('.deposit-date');
        const amountInput = item.querySelector('.deposit-amount');
        const date = dateInput.value.trim();
        const amountText = amountInput.value.trim().replace('€', '').replace(/\./g, '').replace(',', '.');
        const amount = parseFloat(amountText);
        if (date && amount > 0) { acconti.push({ data: date, importo: amount.toFixed(2) }); }
      });
      const editingId = localStorage.getItem('editingClientId');
      let clients = JSON.parse(localStorage.getItem('glStudioClients')) || [];
      const cliente = {
        id: editingId ? parseInt(editingId) : Date.now(),
        cognome1: cognome1 || '', nome1: nome1 || '', indirizzo1: document.getElementById('indirizzo1').value.trim() || '', citta1: document.getElementById('citta1').value.trim() || '', telefono1: telefono1 || '', email1: document.getElementById('email1').value.trim() || '',
        cognome2: document.getElementById('cognome2').value.trim() || '', nome2: document.getElementById('nome2').value.trim() || '', indirizzo2: document.getElementById('indirizzo2').value.trim() || '', citta2: document.getElementById('citta2').value.trim() || '', telefono2: document.getElementById('telefono2').value.trim() || '', email2: document.getElementById('email2').value.trim() || '',
        tipoServizio: tipoServizio || '', dataEvento: dataEvento || '', album: document.getElementById('album').value || '', copertina: document.getElementById('copertina').value || '', miniAlbum: document.getElementById('miniAlbum').value || '', effetti: document.getElementById('effetti').value || '', interni: document.getElementById('interni').value || '', fotoBook: document.getElementById('fotoBook').value || '', anteprima: document.getElementById('anteprima').value || '', postServizio: document.getElementById('postServizio').value || '', video: document.getElementById('video').value || '', tela: document.getElementById('tela').value || '', stampeCarta: document.getElementById('stampeCarta').value || '', miniPocket: document.getElementById('miniPocket').value || '', servizioSalaPosa: document.getElementById('servizioSalaPosa').value || 'INCLUSO', servizioLocation: document.getElementById('servizioLocation').value || 'INCLUSO', chiesa: document.getElementById('chiesa').value.trim() || '', galleryEmail: document.getElementById('galleryEmail').value.trim() || '', galleryPassword: document.getElementById('galleryPassword').value.trim() || '', galleryUrl: document.getElementById('galleryUrl').value.trim() || '', cartellaServizio: document.getElementById('cartellaServizio').value.trim() || '', nota: document.getElementById('nota').value.trim() || '', importoTotale: parseFloat(importoText) || 0, acconti: acconti, dataSalvataggio: new Date().toISOString()
      };
      if (editingId) { const index = clients.findIndex(c => c.id === parseInt(editingId)); if (index !== -1) { clients[index] = cliente; } localStorage.removeItem('editingClientId'); }
      else { clients.push(cliente); }
      localStorage.setItem('glStudioClients', JSON.stringify(clients));
      alert('✅ Cliente salvato con successo!');
      loadClients();
      if (!editingId && confirm('Vuoi resettare il modulo per un nuovo cliente?')) { resetForm(); }
    }
    function resetForm() {
      document.querySelectorAll('input:not([type="checkbox"]):not([type="radio"]), select, textarea').forEach(el => { if (el.id !== 'importoTotale') { el.value = ''; } });
      document.getElementById('servizioSalaPosa').value = 'INCLUSO';
      document.getElementById('servizioLocation').value = 'INCLUSO';
      document.getElementById('depositList').innerHTML = '';
      document.getElementById('saldoResiduo').textContent = 'SALDO RESIDUO: € 0,00';
    }
    function loadClients() {
      const clients = JSON.parse(localStorage.getItem('glStudioClients')) || [];
      const clientList = document.getElementById('clientList');
      clientList.innerHTML = '';
      if (clients.length === 0) { clientList.innerHTML = '<p style="text-align: center; color: var(--gray-color); padding: 20px;">Nessun cliente salvato</p>'; return; }
      clients.sort((a, b) => new Date(a.dataEvento) - new Date(b.dataEvento));
      clients.forEach(cliente => {
        const totaleAcconti = cliente.acconti.reduce((sum, acc) => sum + parseFloat(acc.importo), 0);
        const saldoResiduo = cliente.importoTotale - totaleAcconti;
        const clientCard = document.createElement('div');
        clientCard.className = 'client-card';
        clientCard.innerHTML = '<div class="client-card-header"><div class="client-card-title">' + cliente.cognome1 + ' ' + cliente.nome1 + (cliente.cognome2 ? ' & ' + cliente.cognome2 : '') + '</div><div class="client-card-date">' + formatDate(cliente.dataEvento) + '</div></div><div class="client-card-service">' + cliente.tipoServizio + ' • ' + cliente.dataEvento + '</div><div class="client-card-amounts"><span class="client-card-total">Totale: € ' + cliente.importoTotale.toFixed(2).replace('.', ',') + '</span><span class="client-card-deposits">Acconti: € ' + totaleAcconti.toFixed(2).replace('.', ',') + '</span><span class="client-card-balance">Saldo: € ' + saldoResiduo.toFixed(2).replace('.', ',') + '</span></div><div class="card-buttons"><button class="card-btn edit" onclick="editClient(' + cliente.id + ')">✏️ Modifica</button>' + (cliente.telefono1 ? '<button class="card-btn whatsapp" onclick="openWhatsApp(\'' + cliente.telefono1 + '\', \'' + cliente.nome1 + ' ' + cliente.cognome1 + '\')">💬 WhatsApp 1</button>' : '') + (cliente.telefono2 ? '<button class="card-btn whatsapp" onclick="openWhatsApp(\'' + cliente.telefono2 + '\', \'' + cliente.nome2 + ' ' + cliente.cognome2 + '\')">💬 WhatsApp 2</button>' : '') + '<button class="card-btn pdf" onclick="generatePDF(' + cliente.id + ')">🖨️ PDF</button><button class="card-btn delete" onclick="deleteClient(' + cliente.id + ')">❌ Elimina</button></div>';
        clientList.appendChild(clientCard);
      });
    }
    function formatDate(dateString) { if (!dateString) return ''; const date = parseDate(dateString); return ('0' + date.getDate()).slice(-2) + '/' + ('0' + (date.getMonth() + 1)).slice(-2) + '/' + date.getFullYear(); }
    function parseDate(dateStr) { if (!dateStr) return new Date(); if (dateStr.includes('/')) { const parts = dateStr.split('/'); return new Date(parts[2], parts[1] - 1, parts[0]); } return new Date(dateStr); }
    function filterClients() { const searchTerm = document.getElementById('searchInput').value.toLowerCase().trim(); const clientCards = document.querySelectorAll('.client-card'); clientCards.forEach(card => { const cardText = card.textContent.toLowerCase(); card.style.display = cardText.includes(searchTerm) ? 'block' : 'none'; }); }
    function editClient(clientId) {
      const clients = JSON.parse(localStorage.getItem('glStudioClients')) || [];
      const cliente = clients.find(c => c.id === clientId);
      if (!cliente) return;
      document.getElementById('cognome1').value = cliente.cognome1 || ''; document.getElementById('nome1').value = cliente.nome1 || ''; document.getElementById('indirizzo1').value = cliente.indirizzo1 || ''; document.getElementById('citta1').value = cliente.citta1 || ''; document.getElementById('telefono1').value = cliente.telefono1 || ''; document.getElementById('email1').value = cliente.email1 || '';
      document.getElementById('cognome2').value = cliente.cognome2 || ''; document.getElementById('nome2').value = cliente.nome2 || ''; document.getElementById('indirizzo2').value = cliente.indirizzo2 || ''; document.getElementById('citta2').value = cliente.citta2 || ''; document.getElementById('telefono2').value = cliente.telefono2 || ''; document.getElementById('email2').value = cliente.email2 || '';
      document.getElementById('tipoServizio').value = cliente.tipoServizio || ''; document.getElementById('dataEvento').value = cliente.dataEvento || ''; document.getElementById('album').value = cliente.album || ''; document.getElementById('copertina').value = cliente.copertina || ''; document.getElementById('miniAlbum').value = cliente.miniAlbum || ''; document.getElementById('effetti').value = cliente.effetti || ''; document.getElementById('interni').value = cliente.interni || ''; document.getElementById('fotoBook').value = cliente.fotoBook || ''; document.getElementById('anteprima').value = cliente.anteprima || ''; document.getElementById('postServizio').value = cliente.postServizio || ''; document.getElementById('video').value = cliente.video || ''; document.getElementById('tela').value = cliente.tela || ''; document.getElementById('stampeCarta').value = cliente.stampeCarta || ''; document.getElementById('miniPocket').value = cliente.miniPocket || ''; document.getElementById('servizioSalaPosa').value = cliente.servizioSalaPosa || 'INCLUSO'; document.getElementById('servizioLocation').value = cliente.servizioLocation || 'INCLUSO'; document.getElementById('chiesa').value = cliente.chiesa || ''; document.getElementById('galleryEmail').value = cliente.galleryEmail || ''; document.getElementById('galleryPassword').value = cliente.galleryPassword || ''; document.getElementById('galleryUrl').value = cliente.galleryUrl || ''; document.getElementById('cartellaServizio').value = cliente.cartellaServizio || ''; document.getElementById('nota').value = cliente.nota || ''; document.getElementById('importoTotale').value = cliente.importoTotale.toFixed(2).replace('.', ',') + ' €';
      const depositList = document.getElementById('depositList'); depositList.innerHTML = '';
      cliente.acconti.forEach(acc => { const depositDiv = document.createElement('div'); depositDiv.className = 'deposit-item'; depositDiv.innerHTML = '<input type="text" class="deposit-date" value="' + acc.data + '" style="width: 120px; text-align: center;" readonly><input type="text" class="deposit-amount" value="' + parseFloat(acc.importo).toFixed(2).replace('.', ',') + ' €" style="flex: 1;" readonly><button class="deposit-btn edit" onclick="editDeposit(this)">✏️</button><button class="deposit-btn delete" onclick="deleteDeposit(this)">❌</button>'; depositList.appendChild(depositDiv); });
      window.scrollTo({ top: 0, behavior: 'smooth' });
      alert('✏️ Dati cliente caricati nel modulo. Modifica i campi necessari e premi "SALVA CLIENTE" per aggiornare.');
    }
    function deleteClient(clientId) { if (!confirm('⚠️ Sei sicuro di eliminare questo cliente? Questa azione è irreversibile.')) return; let clients = JSON.parse(localStorage.getItem('glStudioClients')) || []; clients = clients.filter(c => c.id !== clientId); localStorage.setItem('glStudioClients', JSON.stringify(clients)); alert('✅ Cliente eliminato con successo'); loadClients(); }
    function openMaps(fieldId) { const address = document.getElementById(fieldId).value.trim(); if (!address) { alert('⚠️ Inserisci prima un indirizzo'); return; } window.open('https://www.google.com/maps/search/?api=1&query=' + encodeURIComponent(address), '_blank'); }
    function openWhatsApp(phone, name) { const cleanPhone = phone.replace(/\D/g, ''); if (cleanPhone.length < 8) { alert('⚠️ Numero di telefono non valido'); return; } const message = 'Ciao ' + name + ', ecco il link alla tua galleria fotografica...'; window.open('https://wa.me/' + cleanPhone + '?text=' + encodeURIComponent(message), '_blank'); }
    async function generatePDF(clientId) {
      const clients = JSON.parse(localStorage.getItem('glStudioClients')) || [];
      const cliente = clients.find(c => c.id === clientId);
      if (!cliente) { alert('Cliente non trovato'); return; }
      try {
        const printSection = document.createElement('div');
        printSection.id = 'printSection';
        printSection.style.padding = '20px';
        printSection.style.fontFamily = "'Segoe UI', Tahoma, Geneva, Verdana, sans-serif";
        printSection.style.maxWidth = '800px';
        printSection.style.margin = '0 auto';
        const totaleAcconti = cliente.acconti.reduce((sum, acc) => sum + parseFloat(acc.importo), 0);
        const saldoResiduo = cliente.importoTotale - totaleAcconti;
        printSection.innerHTML = '<div style="text-align: center; border-bottom: 3px solid #e63946; padding-bottom: 15px; margin-bottom: 20px;"><h1 style="color: #1d3557; font-size: 24px;">G&L Studio</h1><p style="color: #8d99ae;">Via Ciarrocco n.21, Canicattì (AG)</p></div><h2 style="color: #1d3557; text-align: center; margin: 20px 0;">SCHEDA CLIENTE</h2><div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 25px;"><div><h3 style="color: #1d3557; margin-bottom: 10px;">👤 Cliente 1</h3><p><strong>Cognome:</strong> ' + (cliente.cognome1 || 'N/A') + '</p><p><strong>Nome:</strong> ' + (cliente.nome1 || 'N/A') + '</p><p><strong>Indirizzo:</strong> ' + (cliente.indirizzo1 || 'N/A') + (cliente.indirizzo1 ? ' - ' + cliente.citta1 : '') + '</p><p><strong>Telefono:</strong> ' + (cliente.telefono1 || 'N/A') + '</p><p><strong>Email:</strong> ' + (cliente.email1 || 'N/A') + '</p></div>' + (cliente.cognome2 ? '<div><h3 style="color: #1d3557; margin-bottom: 10px;">👤 Cliente 2</h3><p><strong>Cognome:</strong> ' + (cliente.cognome2 || 'N/A') + '</p><p><strong>Nome:</strong> ' + (cliente.nome2 || 'N/A') + '</p><p><strong>Indirizzo:</strong> ' + (cliente.indirizzo2 || 'N/A') + (cliente.indirizzo2 ? ' - ' + cliente.citta2 : '') + '</p><p><strong>Telefono:</strong> ' + (cliente.telefono2 || 'N/A') + '</p><p><strong>Email:</strong> ' + (cliente.email2 || 'N/A') + '</p></div>' : '') + '</div><div style="background-color: rgba(230, 57, 70, 0.1); padding: 15px; border-radius: 8px; text-align: center; font-weight: bold; font-size: 18px; margin: 25px 0;">LAVORO COMMISSIONATO</div><div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 20px;"><p><strong>Tipo Servizio:</strong> ' + (cliente.tipoServizio || 'N/A') + '</p><p><strong>Data Evento:</strong> ' + formatDate(cliente.dataEvento) + '</p></div><div style="margin-bottom: 20px;"><h3 style="color: #1d3557; margin-bottom: 10px;">Servizi Selezionati</h3><div style="display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; font-size: 14px;">' + (cliente.album ? '<p><strong>Album:</strong> ' + cliente.album + '</p>' : '') + (cliente.copertina ? '<p><strong>Copertina:</strong> ' + cliente.copertina + '</p>' : '') + (cliente.miniAlbum ? '<p><strong>Mini Album:</strong> ' + cliente.miniAlbum + '</p>' : '') + (cliente.effetti ? '<p><strong>Effetti:</strong> ' + cliente.effetti + '</p>' : '') + (cliente.interni ? '<p><strong>Interni:</strong> ' + cliente.interni + '</p>' : '') + (cliente.fotoBook ? '<p><strong>Foto Book:</strong> ' + cliente.fotoBook + '</p>' : '') + (cliente.anteprima ? '<p><strong>Anteprima:</strong> ' + cliente.anteprima + '</p>' : '') + (cliente.postServizio ? '<p><strong>Post Servizio:</strong> ' + cliente.postServizio + '</p>' : '') + (cliente.video ? '<p><strong>Video:</strong> ' + cliente.video + '</p>' : '') + (cliente.tela ? '<p><strong>TELA:</strong> ' + cliente.tela + '</p>' : '') + (cliente.stampeCarta ? '<p><strong>Stampe:</strong> ' + cliente.stampeCarta + '</p>' : '') + (cliente.miniPocket ? '<p><strong>Mini Pocket:</strong> ' + cliente.miniPocket + '</p>' : '') + '<p><strong>Sala Posare:</strong> ' + cliente.servizioSalaPosa + '</p><p><strong>Location:</strong> ' + cliente.servizioLocation + '</p>' + (cliente.chiesa ? '<p><strong>Chiesa/Location:</strong> ' + cliente.chiesa + '</p>' : '') + '</div></div>' + (cliente.galleryEmail || cliente.galleryPassword || cliente.galleryUrl ? '<div style="margin-bottom: 20px; padding: 15px; background-color: #f8f9fa; border-radius: 8px;"><h3 style="color: #1d3557; margin-bottom: 10px;">APP. GALLERY</h3>' + (cliente.galleryEmail ? '<p><strong>Email:</strong> ' + cliente.galleryEmail + '</p>' : '') + (cliente.galleryPassword ? '<p><strong>Password:</strong> ' + cliente.galleryPassword + '</p>' : '') + (cliente.galleryUrl ? '<p><strong>URL:</strong> <a href="' + cliente.galleryUrl + '" target="_blank">' + cliente.galleryUrl + '</a></p>' : '') + '</div>' : '') + (cliente.cartellaServizio ? '<div style="margin-bottom: 15px;"><p><strong>Cartella servizio in:</strong> ' + cliente.cartellaServizio + '</p></div>' : '') + (cliente.nota ? '<div style="margin-bottom: 20px;"><h3 style="color: #1d3557; margin-bottom: 10px;">NOTA</h3><p style="white-space: pre-wrap;">' + cliente.nota + '</p></div>' : '') + '<div style="text-align: center; margin: 30px 0; padding: 20px; background-color: rgba(230, 57, 70, 0.1); border-radius: 12px;"><p style="font-size: 24px; font-weight: bold; color: #e63946; margin-bottom: 10px;">IMPORTO TOTALE IVA ESCLUSA</p><p style="font-size: 28px; font-weight: bold; color: #e63946;">€ ' + cliente.importoTotale.toFixed(2).replace('.', ',') + '</p></div><div style="margin-bottom: 20px;"><h3 style="color: #1d3557; margin-bottom: 10px;">Acconti Ricevuti</h3>' + (cliente.acconti.length > 0 ? cliente.acconti.map(acc => '<p style="margin: 5px 0;">' + acc.data + ' - € ' + parseFloat(acc.importo).toFixed(2).replace('.', ',') + '</p>').join('') : '<p>Nessun acconto registrato</p>') + '</div><div style="text-align: center; font-size: 22px; font-weight: bold; color: #e63946; padding: 15px; background-color: rgba(230, 57, 70, 0.1); border-radius: 8px;">SALDO RESIDUO: € ' + saldoResiduo.toFixed(2).replace('.', ',') + '</div><div style="margin-top: 30px; text-align: center; font-size: 14px; color: #8d99ae;"><p>G&L Studio - Via Ciarrocco n.21, Canicattì (AG)</p><p>Tel: +39 366 9381103 / 320 6337370 | Email: weddinggel@aruba.it</p></div>';
        document.body.appendChild(printSection);
        const pdf = new jsPDF('p', 'mm', 'a4');
        const canvas = await html2canvas(printSection, { scale: 2, useCORS: true, logging: false });
        const imgData = canvas.toDataURL('image/png');
        const imgWidth = 190;
        const pageHeight = 295;
        const imgHeight = canvas.height * imgWidth / canvas.width;
        let heightLeft = imgHeight;
        let position = 10;
        pdf.addImage(imgData, 'PNG', 10, position, imgWidth, imgHeight);
        heightLeft -= pageHeight;
        while (heightLeft >= 0) { position = heightLeft - imgHeight; pdf.addPage(); pdf.addImage(imgData, 'PNG', 10, position, imgWidth, imgHeight); heightLeft -= pageHeight; }
        pdf.save('G&L_Studio_Cliente_' + cliente.cognome1 + '_' + formatDate(cliente.dataEvento) + '.pdf');
        document.body.removeChild(printSection);
      } catch (error) { console.error('Errore generazione PDF:', error); alert('❌ Errore durante la generazione del PDF. Riprova.'); }
    }
    function downloadBackup() {
      const clients = JSON.parse(localStorage.getItem('glStudioClients')) || [];
      if (clients.length === 0) { alert('Nessun dato da esportare'); return; }
      let backupNum = parseInt(localStorage.getItem('backupNumber') || '0') + 1;
      localStorage.setItem('backupNumber', backupNum.toString());
      const backupData = { version: 'G&L Studio v1.0', exportDate: new Date().toISOString(), clients: clients };
      const filename = 'backup-gl-studio-clienti-' + String(backupNum).padStart(3, '0') + '.json';
      const blob = new Blob([JSON.stringify(backupData, null, 2)], { type: 'application/json' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = filename;
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      URL.revokeObjectURL(url);
      alert('✅ Backup salvato: ' + filename);
    }
    function initEditForm() { const editingClientId = localStorage.getItem('editingClientId'); if (editingClientId) { editClient(parseInt(editingClientId)); } }
  </script>
