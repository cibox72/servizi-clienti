<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>G&L Studio - Gestione Clienti</title>
  <script src="auth.js"></script>
  <style>
    :root { --primary-color: #e63946; --secondary-color: #1d3557; --gray-color: #8d99ae; --border-radius: 8px; }
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
    body { background-color: #f8f9fa; padding: 20px; max-width: 1400px; margin: 0 auto; }
    .header { text-align: center; margin-bottom: 25px; padding: 15px; border-bottom: 3px solid var(--primary-color); }
    .header h1 { color: var(--secondary-color); font-size: 28px; }
    .nav-buttons { display: flex; justify-content: center; gap: 15px; margin-bottom: 30px; flex-wrap: wrap; }
    .nav-btn { padding: 12px 25px; background-color: var(--secondary-color); color: white; border: none; border-radius: var(--border-radius); cursor: pointer; }
    .nav-btn.logout { background-color: var(--primary-color); }
    .form-section { background: white; border-radius: var(--border-radius); padding: 25px; margin-bottom: 30px; }
    .section-title { text-align: center; color: var(--secondary-color); font-size: 22px; margin-bottom: 25px; }
    .client-container { display: grid; grid-template-columns: repeat(auto-fit, minmax(450px, 1fr)); gap: 30px; margin-bottom: 30px; }
    .client-box { background: #fafafa; padding: 20px; border-radius: var(--border-radius); border: 1px solid #ddd; }
    .client-fields { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
    .full-width { grid-column: span 2; }
    .field-group { margin-bottom: 15px; }
    .field-group label { display: block; margin-bottom: 6px; font-weight: 500; color: var(--secondary-color); }
    .field-group input, .field-group select, .field-group textarea { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 6px; }
    .service-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; margin-bottom: 25px; }
    .highlight-line { text-align: center; color: var(--primary-color); font-weight: bold; font-size: 20px; margin: 25px 0; padding: 12px; background-color: rgba(230, 57, 70, 0.08); border-radius: var(--border-radius); }
    #importoTotale { width: 100%; max-width: 400px; padding: 18px; font-size: 32px; font-weight: bold; color: var(--primary-color); border: 3px solid var(--primary-color); border-radius: 12px; text-align: center; }
    .deposit-section { margin-top: 25px; padding-top: 20px; border-top: 2px dashed #ddd; }
    .deposit-item { display: flex; align-items: center; gap: 15px; padding: 12px; background-color: #f9f9f9; border-radius: 8px; margin-bottom: 12px; }
    .deposit-btn { padding: 8px 15px; background-color: #4CAF50; color: white; border: none; border-radius: 6px; cursor: pointer; }
    .deposit-btn.delete { background-color: #f44336; }
    .balance-line { text-align: center; font-size: 24px; font-weight: bold; color: var(--primary-color); margin: 25px 0; padding: 15px; background-color: rgba(230, 57, 70, 0.1); border-radius: var(--border-radius); }
    .action-buttons { display: flex; justify-content: center; gap: 15px; margin-top: 25px; }
    .save-btn { padding: 14px 28px; background-color: var(--primary-color); color: white; border: none; border-radius: var(--border-radius); cursor: pointer; font-size: 16px; }
    .client-list { display: grid; gap: 15px; margin-top: 30px; }
    .client-card { background: white; border-radius: var(--border-radius); padding: 20px; border-left: 5px solid var(--secondary-color); }
    .card-buttons { display: flex; gap: 10px; margin-top: 15px; flex-wrap: wrap; }
    .card-btn { padding: 8px 15px; border: none; border-radius: 6px; cursor: pointer; }
    .card-btn.edit { background-color: #2196F3; color: white; }
    .card-btn.delete { background-color: #f44336; color: white; }
    @media (max-width: 768px) { .service-grid, .client-container { grid-template-columns: 1fr; } }
  </style>
</head>
<body>
  <div class="header"><h1>G&L Studio</h1><p>Via Ciarrocco n.21, Canicattì (AG)</p></div>
  <div class="nav-buttons">
    <button class="nav-btn" onclick="location.href='dashboard.html'">🏠 Dashboard</button>
    <button class="nav-btn" onclick="downloadBackup()">📥 Backup</button>
    <button class="nav-btn" onclick="restoreBackup()">📤 Ripristina</button>
    <button class="nav-btn logout" onclick="location.href='logout.html'">🚪 Esci</button>
  </div>
  <div class="form-section">
    <h2 class="section-title">Nuovo Cliente</h2>
    <div class="client-container">
      <div class="client-box">
        <h3>👤 Cliente 1</h3>
        <div class="client-fields">
          <div class="field-group"><label>Cognome</label><input type="text" id="cognome1" required></div>
          <div class="field-group"><label>Nome</label><input type="text" id="nome1" required></div>
          <div class="field-group full-width"><label>Indirizzo</label><input type="text" id="indirizzo1"></div>
          <div class="field-group"><label>Città</label><input type="text" id="citta1"></div>
          <div class="field-group"><label>Telefono</label><input type="text" id="telefono1" required></div>
          <div class="field-group"><label>Email</label><input type="email" id="email1"></div>
        </div>
      </div>
      <div class="client-box">
        <h3>👤 Cliente 2</h3>
        <div class="client-fields">
          <div class="field-group"><label>Cognome</label><input type="text" id="cognome2"></div>
          <div class="field-group"><label>Nome</label><input type="text" id="nome2"></div>
          <div class="field-group full-width"><label>Indirizzo</label><input type="text" id="indirizzo2"></div>
          <div class="field-group"><label>Città</label><input type="text" id="citta2"></div>
          <div class="field-group"><label>Telefono</label><input type="text" id="telefono2"></div>
          <div class="field-group"><label>Email</label><input type="email" id="email2"></div>
        </div>
      </div>
    </div>
    <div class="highlight-line">LAVORO COMMISSIONATO</div>
    <div style="display: flex; gap: 20px; margin-bottom: 20px; flex-wrap: wrap;">
      <div class="field-group" style="flex: 1;"><label>Tipo di Servizio</label><select id="tipoServizio"><option value="">Seleziona...</option><option value="Matrimonio">Matrimonio</option><option value="Battesimo">Battesimo</option><option value="Comunione">Comunione</option><option value="Evento">Evento</option></select></div>
      <div class="field-group" style="flex: 1;"><label>Data Evento</label><input type="date" id="dataEvento"></div>
    </div>
    <div class="service-grid">
      <div class="field-group"><label>Album</label><select id="album"><option value="">Nessuno</option><option value="DIGITALE 30x40 cm orizz.">DIGITALE 30x40 cm</option></select></div>
      <div class="field-group"><label>Copertina</label><select id="copertina"><option value="">Nessuna</option><option value="EXTRA LUSSO">EXTRA LUSSO</option></select></div>
      <div class="field-group"><label>Video</label><select id="video"><option value="">Nessuno</option><option value="GIORNATA+DRONE">GIORNATA+DRONE</option></select></div>
    </div>
    <div class="amount-section" style="text-align: center; margin: 30px 0;">
      <label style="display: block; margin-bottom: 10px; font-weight: bold;">IMPORTO TOTALE</label>
      <input type="text" id="importoTotale" placeholder="0,00 €" oninput="calculateBalance()">
    </div>
    <div class="deposit-section">
      <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px;">
        <h3>Acconti Ricevuti</h3>
        <button class="deposit-btn" onclick="addDeposit()">+ Aggiungi</button>
      </div>
      <div id="depositList"></div>
    </div>
    <div class="balance-line" id="saldoResiduo">SALDO RESIDUO: € 0,00</div>
    <div class="action-buttons"><button class="save-btn" onclick="saveClient()">✅ SALVA CLIENTE</button></div>
  </div>
  <div class="form-section">
    <h2 class="section-title">Archivio Clienti</h2>
    <div class="client-list" id="clientList"></div>
  </div>
  <script>
    document.addEventListener('DOMContentLoaded', function() { loadClients(); });
    function addDeposit() {
      const depositList = document.getElementById('depositList');
      const now = new Date();
      const today = ('0' + now.getDate()).slice(-2) + '/' + ('0' + (now.getMonth() + 1)).slice(-2) + '/' + now.getFullYear();
      const depositDiv = document.createElement('div');
      depositDiv.className = 'deposit-item';
      depositDiv.innerHTML = '<input type="text" class="deposit-date" value="' + today + '" style="width: 120px;" readonly><input type="text" class="deposit-amount" placeholder="Importo (€)" style="flex: 1;" oninput="calculateBalance()"><button class="deposit-btn delete" onclick="deleteDeposit(this)">❌</button>';
      depositList.appendChild(depositDiv);
      calculateBalance();
    }
    function deleteDeposit(btn) { btn.closest('.deposit-item').remove(); calculateBalance(); }
    function calculateBalance() {
      const importoText = document.getElementById('importoTotale').value.trim().replace('€', '').replace(/\./g, '').replace(',', '.');
      const importoTotale = parseFloat(importoText) || 0;
      let totaleAcconti = 0;
      document.querySelectorAll('.deposit-amount').forEach(input => {
        const value = input.value.trim().replace('€', '').replace(/\./g, '').replace(',', '.');
        totaleAcconti += parseFloat(value) || 0;
      });
      document.getElementById('saldoResiduo').textContent = 'SALDO RESIDUO: € ' + (importoTotale - totaleAcconti).toFixed(2).replace('.', ',');
    }
    function saveClient() {
      const cognome1 = document.getElementById('cognome1').value.trim();
      const nome1 = document.getElementById('nome1').value.trim();
      const telefono1 = document.getElementById('telefono1').value.trim();
      const tipoServizio = document.getElementById('tipoServizio').value;
      const dataEvento = document.getElementById('dataEvento').value;
      const importoText = document.getElementById('importoTotale').value.trim().replace('€', '').replace(/\./g, '').replace(',', '.');
      if (!cognome1 || !nome1 || !telefono1) { alert('⚠️ Compila almeno Cognome, Nome e Telefono'); return; }
      if (!tipoServizio) { alert('⚠️ Seleziona il Tipo di Servizio'); return; }
      if (!dataEvento) { alert('⚠️ Inserisci la Data Evento'); return; }
      const acconti = [];
      document.querySelectorAll('.deposit-item').forEach(item => {
        const date = item.querySelector('.deposit-date').value.trim();
        const amountText = item.querySelector('.deposit-amount').value.trim().replace('€', '').replace(/\./g, '').replace(',', '.');
        const amount = parseFloat(amountText);
        if (date && amount > 0) { acconti.push({ data: date, importo: amount.toFixed(2) }); }
      });
      const cliente = {
        id: Date.now(),
        cognome1: cognome1, nome1: nome1,
        indirizzo1: document.getElementById('indirizzo1').value.trim(),
        citta1: document.getElementById('citta1').value.trim(),
        telefono1: telefono1, email1: document.getElementById('email1').value.trim(),
        cognome2: document.getElementById('cognome2').value.trim(),
        nome2: document.getElementById('nome2').value.trim(),
        indirizzo2: document.getElementById('indirizzo2').value.trim(),
        citta2: document.getElementById('citta2').value.trim(),
        telefono2: document.getElementById('telefono2').value.trim(),
        email2: document.getElementById('email2').value.trim(),
        tipoServizio: tipoServizio, dataEvento: dataEvento,
        album: document.getElementById('album').value,
        copertina: document.getElementById('copertina').value,
        video: document.getElementById('video').value,
        importoTotale: parseFloat(importoText) || 0,
        acconti: acconti,
        dataSalvataggio: new Date().toISOString()
      };
      let clients = JSON.parse(localStorage.getItem('glStudioClients')) || [];
      clients.push(cliente);
      localStorage.setItem('glStudioClients', JSON.stringify(clients));
      alert('✅ Cliente salvato!');
      loadClients();
      if (confirm('Vuoi resettare il modulo?')) { resetForm(); }
    }
    function resetForm() {
      document.querySelectorAll('input, select, textarea').forEach(el => { if (el.id !== 'importoTotale') el.value = ''; });
      document.getElementById('depositList').innerHTML = '';
      document.getElementById('saldoResiduo').textContent = 'SALDO RESIDUO: € 0,00';
    }
    function loadClients() {
      const clients = JSON.parse(localStorage.getItem('glStudioClients')) || [];
      const clientList = document.getElementById('clientList');
      if (clients.length === 0) { clientList.innerHTML = '<p style="text-align: center; color: #888;">Nessun cliente</p>'; return; }
      clientList.innerHTML = clients.map(cliente => {
        const totaleAcconti = cliente.acconti.reduce((sum, acc) => sum + parseFloat(acc.importo), 0);
        const saldoResiduo = cliente.importoTotale - totaleAcconti;
        return '<div class="client-card"><div style="display: flex; justify-content: space-between;"><div><strong>' + cliente.cognome1 + ' ' + cliente.nome1 + '</strong><br>' + cliente.tipoServizio + ' - ' + cliente.dataEvento + '</div><div>Totale: € ' + cliente.importoTotale.toFixed(2) + ' | Saldo: € ' + saldoResiduo.toFixed(2) + '</div></div><div class="card-buttons"><button class="card-btn edit" onclick="editClient(' + cliente.id + ')">✏️ Modifica</button><button class="card-btn delete" onclick="deleteClient(' + cliente.id + ')">❌ Elimina</button></div></div>';
      }).join('');
    }
    function editClient(clientId) {
      const clients = JSON.parse(localStorage.getItem('glStudioClients')) || [];
      const cliente = clients.find(c => c.id === clientId);
      if (!cliente) return;
      document.getElementById('cognome1').value = cliente.cognome1 || '';
      document.getElementById('nome1').value = cliente.nome1 || '';
      document.getElementById('indirizzo1').value = cliente.indirizzo1 || '';
      document.getElementById('citta1').value = cliente.citta1 || '';
      document.getElementById('telefono1').value = cliente.telefono1 || '';
      document.getElementById('email1').value = cliente.email1 || '';
      document.getElementById('cognome2').value = cliente.cognome2 || '';
      document.getElementById('nome2').value = cliente.nome2 || '';
      document.getElementById('indirizzo2').value = cliente.indirizzo2 || '';
      document.getElementById('citta2').value = cliente.citta2 || '';
      document.getElementById('telefono2').value = cliente.telefono2 || '';
      document.getElementById('email2').value = cliente.email2 || '';
      document.getElementById('tipoServizio').value = cliente.tipoServizio || '';
      document.getElementById('dataEvento').value = cliente.dataEvento || '';
      document.getElementById('album').value = cliente.album || '';
      document.getElementById('copertina').value = cliente.copertina || '';
      document.getElementById('video').value = cliente.video || '';
      document.getElementById('importoTotale').value = cliente.importoTotale.toFixed(2).replace('.', ',') + ' €';
      const depositList = document.getElementById('depositList');
      depositList.innerHTML = '';
      cliente.acconti.forEach(acc => {
        const depositDiv = document.createElement('div');
        depositDiv.className = 'deposit-item';
        // ✅ CORRETTO: usa acc.data (non acc.date)
        depositDiv.innerHTML = '<input type="text" class="deposit-date" value="' + (acc.data || '') + '" style="width: 120px;" readonly><input type="text" class="deposit-amount" value="' + parseFloat(acc.importo).toFixed(2).replace('.', ',') + ' €" style="flex: 1;" readonly><button class="deposit-btn delete" onclick="deleteDeposit(this)">❌</button>';
        depositList.appendChild(depositDiv);
      });
      window.scrollTo({ top: 0, behavior: 'smooth' });
      alert('✏️ Dati caricati. Modifica e salva.');
    }
    function deleteClient(clientId) {
      if (!confirm('⚠️ Eliminare questo cliente?')) return;
      let clients = JSON.parse(localStorage.getItem('glStudioClients')) || [];
      clients = clients.filter(c => c.id !== clientId);
      localStorage.setItem('glStudioClients', JSON.stringify(clients));
      alert('✅ Cliente eliminato');
      loadClients();
    }
    function downloadBackup() {
      const clients = JSON.parse(localStorage.getItem('glStudioClients')) || [];
      if (clients.length === 0) { alert('Nessun dato'); return; }
      const backupData = { version: 'G&L Studio v1.0', exportDate: new Date().toISOString(), clients: clients };
      const blob = new Blob([JSON.stringify(backupData, null, 2)], { type: 'application/json' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = 'backup-gl-studio.json';
      a.click();
      alert('✅ Backup scaricato');
    }
    function restoreBackup() {
      const input = document.createElement('input');
      input.type = 'file';
      input.accept = '.json';
      input.onchange = e => {
        const file = e.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = event => {
          try {
            const data = JSON.parse(event.target.result);
            if (!data.clients) { alert('❌ File non valido'); return; }
            if (!confirm('⚠️ Sovrascrivere tutti i clienti (' + data.clients.length + ')?')) return;
            localStorage.setItem('glStudioClients', JSON.stringify(data.clients));
            alert('✅ Backup ripristinato (' + data.clients.length + ' clienti)');
            loadClients();
          } catch (error) { alert('❌ Errore'); }
        };
        reader.readAsText(file);
      };
      input.click();
    }
  </script>
</body>
</html>
