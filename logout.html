<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>G&L Studio - Logout</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
    body { background: linear-gradient(135deg, #1d3557 0%, #457b9d 100%); min-height: 100vh; display: flex; justify-content: center; align-items: center; }
    .logout-container { background: white; border-radius: 20px; padding: 50px; text-align: center; max-width: 450px; }
    .logout-icon { font-size: 80px; margin-bottom: 20px; }
    .logout-btn { padding: 15px 40px; background: linear-gradient(135deg, #e63946 0%, #c1272d 100%); color: white; border: none; border-radius: 10px; font-size: 18px; cursor: pointer; text-decoration: none; display: inline-block; margin-top: 20px; }
  </style>
</head>
<body>
  <div class="logout-container">
    <div class="logout-icon">👋</div>
    <h1>Arrivederci!</h1>
    <p>Sei uscito correttamente</p>
    <a href="index.html" class="logout-btn">🔒 Torna al Login</a>
  </div>
  <script>
    localStorage.removeItem('glStudioAuthenticated');
    localStorage.removeItem('glStudioUser');
    localStorage.removeItem('glStudioLoginTime');
  </script>
</body>
</html>
