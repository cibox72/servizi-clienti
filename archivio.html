<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>G&L Studio - Archivio</title>
  <script src="auth.js"></script>
  <style>
    :root { --primary-color: #e63946; --secondary-color: #1d3557; --gray-color: #8d99ae; }
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
    body { background: #f5f7fa; padding: 20px; }
    .header { background: white; padding: 25px; border-radius: 12px; margin-bottom: 30px; display: flex; justify-content: space-between; align-items: center; }
    .nav-btn { padding: 12px 25px; background: var(--secondary-color); color: white; border: none; border-radius: 8px; cursor: pointer; margin-left: 10px; }
    .client-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(400px, 1fr)); gap: 25px; }
    .client-card { background: white; padding: 25px; border-radius: 12px; border-left: 5px solid var(--secondary-color); }
    .client-card-header { display: flex; justify-content: space-between; margin-bottom: 15px; }
    .client-card-title { font-size: 20px; font-weight: bold; color: var(--secondary-color); }
    .client-card-date { background: var(--primary-color); color: white; padding: 6px 15px; border-radius: 20px; }
    .card-buttons { display: flex; gap: 10px; margin-top: 20px; }
    .card-btn { padding: 10px 18px; border: none; border-radius: 6px; cursor: pointer; }
    .card-btn.edit { background: #2196F3; color: white; }
    .card-btn.delete { background: #f44336; color: white; }
  </style>
</head>
<body>
  <div class="header">
    <h1>📁 Archivio Clienti</h1>
    <div>
      <button class="nav-btn" onclick="location.href='dashboard.html'">🏠 Dashboard</button>
      <button class="nav-btn" onclick="location.href='clienti.html'">➕ Nuovo</button>
      <button class="nav-btn" onclick="logout()">🚪 Esci</button>
    </div>
  </div>
  <div class="client-grid" id="clientGrid"></div>
  <script>
    if (!isAuthenticated()) { window.location.href = 'index.html'; }
    document.addEventListener('DOMContentLoaded', loadClients);
    function loadClients() {
      const clients = JSON.parse(localStorage.getItem('glStudioClients')) || [];
      const grid = document.getElementById('clientGrid');
      if (clients.length === 0) { grid.innerHTML = '<p style="text-align: center; grid-column: 1/-1;">Nessun cliente</p>'; return; }
      grid.innerHTML = clients.map(cliente => {
        const totaleAcconti = cliente.acconti.reduce((sum, acc) => sum + parseFloat(acc.importo), 0);
        const saldo = cliente.importoTotale - totaleAcconti;
        return '<div class="client-card"><div class="client-card-header"><div class="client-card-title">' + cliente.cognome1 + ' ' + cliente.nome1 + '</div><div class="client-card-date">' + cliente.dataEvento + '</div></div><p>' + cliente.tipoServizio + '</p><p>Totale: € ' + cliente.importoTotale.toFixed(2) + ' | Acconti: € ' + totaleAcconti.toFixed(2) + ' | Saldo: € ' + saldo.toFixed(2) + '</p><div class="card-buttons"><button class="card-btn edit" onclick="editClient(' + cliente.id + ')">✏️ Modifica</button><button class="card-btn delete" onclick="deleteClient(' + cliente.id + ')">❌ Elimina</button></div></div>';
      }).join('');
    }
    function editClient(id) { localStorage.setItem('editingClientId', id); window.location.href = 'clienti.html'; }
    function deleteClient(id) {
      if (!confirm('Eliminare?')) return;
      let clients = JSON.parse(localStorage.getItem('glStudioClients')) || [];
      clients = clients.filter(c => c.id !== id);
      localStorage.setItem('glStudioClients', JSON.stringify(clients));
      loadClients();
    }
    function logout() { if (confirm('Uscire?')) window.location.href = 'logout.html'; }
  </script>
</body>
</html>
